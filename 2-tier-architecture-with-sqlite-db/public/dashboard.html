<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>
    
    <style>
        body { font-family: system-ui; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: auto; }
        .card { padding: 30px; border: 1px solid #cbd5e1; border-radius: 8px; text-decoration: none; color: #334155; font-weight: bold; }
        .card:hover { background: #eff6ff; }
    </style>
</head>
<body>
    <div class="container" style="margin-top: 80px;">
        <h1>DevOps Command Center</h1>
        <div class="grid">
            
            <a href="/app" class="card">CIDR Calculator</a>
            <a href="/ssh" class="card">SSH Terminals</a>
            <a href="/vpc" class="card">AWS VPC Builder</a>
            <a href="/ec2" class="card">EC2 Types</a>
            <a href="/storage" class="card">Storage Studio</a>
            
        </div>
    </div>
</body>
</html>
