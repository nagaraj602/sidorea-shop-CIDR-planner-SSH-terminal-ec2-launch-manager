<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Dashboard</title>
    <script src="/navbar-1.js"></script>
    <style>
        body { font-family: system-ui; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: auto; }
        .dashboard-card {
            background-color: var(--card-bg); 
            color: var(--text);
            border: 1px solid var(--border);
            transition: background-color 0.2s, color 0.2s, border-color 0.2s; /* Ensures smooth switching */
        }
        .card { padding: 30px; border: 1px solid #cbd5e1; border-radius: 8px; text-decoration: none; color: #919317; font-weight: bold; }
        .card:hover { background: #001d47; }
    </style>
</head>
<body>
    <div class="container" style="margin-top: 80px;">
        <h1>Sidorea Dashboard</h1>
        <div class="grid">
            
            <a href="/app" class="card">CIDR Calculator</a>
            <a href="/ssh" class="card">SSH Terminals</a>
            <a href="/vpc" class="card">AWS VPC Builder</a>
            <a href="/ec2" class="card">EC2 Types</a>
            <a href="/storage" class="card">Storage Studio</a>
            
        </div>
    </div>
</body>
</html>
