---
# ==========================================
# 1. ENVIRONMENT CONFIGMAP
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: sidorea-env-config
data:
  PORT: "3000"
  NODE_ENV: "production"

---
# ==========================================
# 2. PERSISTENCE (SQLite & Workspaces)
# ==========================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sidorea-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ==========================================
# 3. APPLICATION TIER: StatefulSet (2-Tier)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: sidorea-app-service
spec:
  type: NodePort # Allows external access on bare metal
  selector:
    app: sidorea-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sidorea-app
spec:
  serviceName: "sidorea-app-service"
  replicas: 1
  selector:
    matchLabels:
      app: sidorea-app
  template:
    metadata:
      labels:
        app: sidorea-app
    spec:
      containers:
      - name: sidorea-node
        image: your-dockerhub-user/sidorea-2tier:latest # REPLACE THIS WITH YOUR IMAGE
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: sidorea-env-config
        volumeMounts:
        - name: app-data
          mountPath: /app/data # Preserves SQLite DB, SSH keys, and Terraform workspaces
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: sidorea-data-pvc

---
