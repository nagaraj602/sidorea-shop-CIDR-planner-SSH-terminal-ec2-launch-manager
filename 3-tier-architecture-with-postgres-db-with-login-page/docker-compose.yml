version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sidorea-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: sidorea
      POSTGRES_USER: sidorea
      POSTGRES_PASSWORD: sidorea123

    volumes:
      - postgres-data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidorea -d sidorea"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - sidorea-network

  backend:
    build:
      context: ./backend_api
      dockerfile: Dockerfile

    container_name: sidorea-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      NODE_ENV: production

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sidorea
      DB_USER: sidorea
      DB_PASSWORD: sidorea123

    ports:
      - "3000:3000"

    networks:
      - sidorea-network

  frontend:
    build:
      context: ./frontend_public
      dockerfile: Dockerfile

    container_name: sidorea-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

    networks:
      - sidorea-network

volumes:
  postgres-data:

networks:
  sidorea-network:
    driver: bridge
